services:
  - type: web
    name: bloom-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FLASK_DEBUG
        value: "False"